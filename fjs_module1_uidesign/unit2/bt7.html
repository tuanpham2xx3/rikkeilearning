<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Báo Cáo Tài Chính Năm</h1>
    <table border="1">
      <caption>
        Báo cáo doanh thu và lợi nhuận các quý trong năm
      </caption>
      <thead>
        <tr>
          <th scope="col">Chỉ tiêu</th>
          <th scope="col">Quý 1</th>
          <th scope="col">Quý 2</th>
          <th scope="col">Quý 3</th>
          <th scope="col">Quý 4</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Doanh thu (Tỷ VNĐ)</th>
          <td>500</td>
          <td>650</td>
          <td>700</td>
          <td>850</td>
        </tr>
        <tr>
          <th scope="row">Lợi nhuận (Tỷ VNĐ)</th>
          <td>120</td>
          <td>180</td>
          <td>210</td>
          <td>250</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
