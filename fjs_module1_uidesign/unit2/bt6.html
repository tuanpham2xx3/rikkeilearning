<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Hồ sơ thông tin cá nhân</h1>
    <form action="">
      <fieldset>
        <legend>Thông tin cá nhân</legend>
        <label for="name">Tên:</label>
        <input type="text" placeholder="Nhập họ và tên..." /> <br />
        <br />
        <label for="bd">Ngày sinh:</label>
        <input type="date" />
      </fieldset>
      <br />
      <fieldset>
        <legend>Thông tin liên hệ</legend>
        <label for="email">Email:</label>
        <input type="text" placeholder="example@gmail.com" /> <br />
        <br />
        <label for="phone">Số điện thoại:</label>
        <input type="number" placeholder="0912345678" />
      </fieldset>
      <br />
      <label for="nation">Ghi chú bổ sung:</label> <br />
      <br />
      <textarea
        name="note"
        cols="40"
        rows="4"
        placeholder="Nhập ghi chú của bạn tại đây..."
      ></textarea>
      <br />
      <br />
      <button>Lưu hồ sơ</button>
    </form>
  </body>
</html>
