<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #e8e8e8;
        font-family: Arial, sans-serif;
      }
      .card {
        width: 280px;
        background-color: rgb(255, 255, 255);
        border-radius: 12px;
        overflow: hidden;
      }
      .card_img {
        display: block;
        width: 100%;
        height: 200px;
        object-fit: cover;
        background-color: #fff;
      }
      .card_body {
        padding: 16px;
      }
      .card_title {
        font-size: 1.1rem;
        font-weight: bold;
        margin-bottom: 16px;
        color: black;
        text-align: center;
      }
      .card_price {
        font-size: 1rem;
        font-weight: bold;
        margin-bottom: 16px;
        color: red;
        text-align: center;
      }
      .btn-buy {
        width: 100%;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        background-color: green;
      }
      .btn-buy:hover {
        background-color: rgba(255, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <article class="card">
      <img class="card_img" src="bt5.png" alt="giày thể thao siêu nhẹ" />
      <div class="card_body">
        <h2 class="card_title">Giày Thể Thao Siêu Nhẹ</h2>
        <p class="card_price">1.250.000 VNĐ</p>
        <button type="button" class="btn-buy">Mua ngay</button>
      </div>
    </article>
  </body>
</html>
