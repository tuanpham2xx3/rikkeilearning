<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup Đăng ký khuyến mãi</title>
    <link rel="stylesheet" href="bt5.css" />
  </head>

  <body>
    <div class="popup-block">
      <h2 class="popup-title">Đăng ký nhận khuyến mãi!</h2>
      <p class="popup-description">
        Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ"<br />
        mới nhất từ chúng tôi.
      </p>
      <form class="popup-form">
        <input
          type="email"
          class="form-input"
          placeholder="Nhập địa chỉ email..."
          required
        />
        <button type="submit" class="form-button">Đăng ký ngay</button>
      </form>
    </div>
  </body>
</html>
